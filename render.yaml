services:
  - type: web
    name: bsc-website-bot
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt && cd frontend && npm install && ./node_modules/.bin/vite build"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
