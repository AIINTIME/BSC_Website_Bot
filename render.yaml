services:
  - type: web
    name: bsc-website-bot
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt && cd frontend && rm -rf node_modules package-lock.json && npm install && chmod +x node_modules/.bin/vite && chmod +x node_modules/vite/bin/vite.js && npm run build"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
