services:
  - type: web
    name: bsc-website-bot
    runtime: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt && cd frontend && rm -rf node_modules && npm cache clean --force && npm install && npm run build"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
